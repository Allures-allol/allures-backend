version: "3.9"

services:
  allures-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allures-backend
    ports:
      - "8008:8000"  # хост:контейнер
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    environment:
      PYTHONPATH: /app:/app/common
      MAINDB_URL: ${MAINDB_URL}  # строка подключения из .env
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000
    restart: always
    depends_on:
      - postgres-db  # если используешь БД в связке

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
